  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0A0A0F;
      color: #FFFFFF;
    }

    .font-heading {
      font-family: 'Space Grotesk', sans-serif;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #0F0F1A;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #6C63FF;
      border-radius: 10px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #5A52E0;
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #6C63FF 0%, #00D4FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Glow effects */
    .glow-purple {
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.3);
    }

    .glow-cyan {
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
    }

    /* Glassmorphism */
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glass-purple {
      background: rgba(108, 99, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(108, 99, 255, 0.2);
    }

    /* Gradient borders */
    .gradient-border {
      position: relative;
      border: 1px solid transparent;
      background-clip: padding-box;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, #6C63FF, #00D4FF);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    /* Animated gradient button */
    .btn-gradient {
      background: linear-gradient(135deg, #6C63FF 0%, #4F46E5 50%, #00D4FF 100%);
      background-size: 200% auto;
      transition: background-position 0.5s, transform 0.2s, box-shadow 0.2s;
    }

    .btn-gradient:hover {
      background-position: right center;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(108, 99, 255, 0.4);
    }

    /* Animated grid background */
    .grid-bg {
      background-image: linear-gradient(rgba(108, 99, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(108, 99, 255, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* Floating dots */
    .dot-pattern {
      background-image: radial-gradient(rgba(108, 99, 255, 0.15) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
